# =========================
# 基础设置
# =========================

# 启用鼠标支持
set -g mouse on

# 更快的响应
set -sg escape-time 0

# 终端颜色
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB,xterm-ghostty:RGB,ghostty:RGB,tmux-256color:RGB"
set -g allow-passthrough on
# =========================
# 窗口和面板
# =========================
# 使用 vim 风格移动 pane

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# 调整 pane 大小
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# 重新加载配置
bind r source-file ~/.tmux.conf \; display "Config Reloaded!"

# =========================
# 窗口操作
# =========================

# 更容易切换窗口
bind -n C-Left previous-window
bind -n C-Right next-window

# 快速新窗口
bind c new-window -c "#{pane_current_path}"

# 新pane继承路径
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# =========================
# 复制模式 (更像vim)
# =========================

setw -g mode-keys vi

# 进入复制模式
bind Enter copy-mode

# 复制快捷键
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# =========================
# 状态栏
# =========================

set -g status-style "fg=white,bg=default"
set -g message-style "fg=white,bg=default"
set -g mode-style "fg=yellow,bg=default"

set -g status-left-length 50
set -g status-right-length 100

# 左侧
set -g status-left "#[fg=green,bg=default]#S "

# 右侧
set -g status-right "#[fg=yellow,bg=default]#(whoami) #[fg=cyan,bg=default]%Y-%m-%d %H:%M "

# =========================
# 窗口样式
# =========================

setw -g window-status-current-style fg=green,bg=default,bold
setw -g window-status-style fg=white,bg=default
setw -g window-status-activity-style fg=yellow,bg=default
set -g pane-border-style fg=colour238
set -g pane-active-border-style fg=green

# =========================
# Pane 背景
# =========================

setw -g window-style "bg=default"
setw -g window-active-style "bg=default"

# =========================
# 历史记录
# =========================

set -g history-limit 100000

# =========================
# 快速清屏
# =========================

bind C-l send-keys 'C-l'

# =========================
# 自动重命名
# =========================

set-option -g allow-rename off

# =========================
# 自定义布局
# =========================
unbind v
bind v run-shell "\
    tmux split-window -h -p 20; \
    tmux select-pane -t 0; \
    tmux split-window -v -p 15; \
    tmux select-pane -t 0 \
"
