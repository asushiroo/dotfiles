[mgr]
ratio = [1, 3, 4]
sort_by = "natural"
sort_dir_first = true
show_hidden = true
show_symlink = true
linemode = "mtime"
scrolloff = 8

[preview]
wrap = "yes"
tab_size = 2
max_width = 1800
max_height = 1800
image_delay = 20
image_filter = "triangle"
image_quality = 75

[opener]
edit = [
	{ run = 'nvim %s', block = true, for = "unix" },
]
open = [
	{ run = 'open %s', orphan = true, desc = "Open", for = "macos" },
	{ run = 'xdg-open %s', orphan = true, desc = "Open", for = "linux" },
]
